spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/fortune_db
    username: your_username
    password: your_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update # 개발 단계에서는 update, 운영은 none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    property-naming-strategy: SNAKE_CASE # API 응답 시 snake_case 사용 (선택 사항)